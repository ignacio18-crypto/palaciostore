<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palacio Store — Panel Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a; --white: #fafafa; --accent: #c8a97e;
    --gray: #888; --light-gray: #eee; --red: #d94f3d; --green: #2ebd6b;
    --sidebar-w: 260px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: #f0ede8; color: var(--black); min-height: 100vh; }
  .admin-container { display: flex; min-height: 100vh; }
  .sidebar { width: var(--sidebar-w); background: var(--black); color: var(--white); padding: 2rem 1.5rem; position: fixed; height: 100vh; }
  .sidebar-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem; margin-bottom: 3rem; }
  .nav-menu { list-style: none; }
  .nav-item { padding: 1rem; margin-bottom: 0.5rem; cursor: pointer; border-radius: 8px; transition: 0.3s; display: flex; align-items: center; gap: 12px; }
  .nav-item.active { background: var(--accent); color: var(--black); font-weight: 600; }
  .main-content { margin-left: var(--sidebar-w); flex: 1; padding: 3rem; }
  .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem; }
  .btn-primary { background: var(--black); color: var(--white); padding: 0.8rem 1.5rem; border: none; border-radius: 50px; font-weight: 600; cursor: pointer; }
  .table-container { background: var(--white); border-radius: 16px; padding: 1.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 1rem; color: var(--gray); border-bottom: 1px solid var(--light-gray); }
  td { padding: 1.2rem 1rem; border-bottom: 1px solid var(--light-gray); }
  .prod-info { display: flex; align-items: center; gap: 15px; }
  .prod-img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; background: #eee; }
  .badge { padding: 4px 10px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; background: #e8d5b7; color: #8a6d3b; }
  .actions { display: flex; gap: 10px; }
  .btn-icon { width: 35px; height: 35px; border-radius: 50%; border: 1px solid #ddd; cursor: pointer; background: none; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; place-items: center; z-index: 1000; }
  .modal { background: var(--white); width: 90%; max-width: 500px; padding: 2.5rem; border-radius: 24px; }
  .form-group { margin-bottom: 1.2rem; }
  label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
  input { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 10px; }
  .admin-notif { position: fixed; bottom: 2rem; right: 2rem; padding: 1rem 2rem; border-radius: 12px; color: white; transform: translateY(150%); transition: 0.5s; z-index: 2000; }
  .admin-notif.show { transform: translateY(0); }
  .admin-notif.success { background: var(--green); }
</style>
</head>
<body>

<div class="admin-container">
  <div class="sidebar">
    <div class="sidebar-logo">PALACIO STORE</div>
    <ul class="nav-menu">
      <li class="nav-item active">Productos</li>
      <li class="nav-item" onclick="window.location.href='index.html'">Ver Tienda</li>
    </ul>
  </div>

  <div class="main-content">
    <div class="header-actions">
      <h1>Inventario</h1>
      <button class="btn-primary" onclick="openModal()">+ Nuevo Producto</button>
    </div>
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Producto</th>
            <th>Etiqueta</th>
            <th>Precio</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Producto</h2>
    <form id="productForm">
      <div class="form-group"><label>Nombre</label><input type="text" id="fName" required></div>
      <div class="form-group"><label>Etiqueta</label><input type="text" id="fBadge"></div>
      <div class="form-group" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <div><label>Precio</label><input type="number" id="fPrice" required></div>
        <div><label>Anterior</label><input type="number" id="fOldPrice"></div>
      </div>
      <div class="form-group"><label>URL Imagen</label><input type="url" id="fImgUrl"></div>
      <div style="display:flex; gap:10px; margin-top:20px;">
        <button type="button" class="btn-primary" style="background:#ddd; color:#333;" onclick="closeModal()">Cancelar</button>
        <button type="submit" class="btn-primary" style="flex:1;">Guardar</button>
      </div>
    </form>
  </div>
</div>

<div id="adminNotif" class="admin-notif"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB_Kgid_oL0wscMQlViW1ZweO9v6z_hsz0",
    authDomain: "palacio-store.firebaseapp.com",
    projectId: "palacio-store",
    storageBucket: "palacio-store.firebasestorage.app",
    messagingSenderId: "5927823600",
    appId: "1:5927823600:web:211ffb13596d65c123fa35",
    measurementId: "G-50MRG59294"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const dbRef = ref(db, 'productos');

  let products = [];
  let editingId = null;

  onValue(dbRef, (snapshot) => {
    const data = snapshot.val();
    products = data ? Object.values(data) : [];
    renderTable();
  });

  document.getElementById('productForm').onsubmit = async (e) => {
    e.preventDefault();
    const id = editingId || Date.now();
    const prod = {
      id,
      name: document.getElementById('fName').value,
      badge: document.getElementById('fBadge').value || "",
      price: parseFloat(document.getElementById('fPrice').value),
      oldPrice: parseFloat(document.getElementById('fOldPrice').value) || null,
      img: document.getElementById('fImgUrl').value || ""
    };
    await set(ref(db, 'productos/' + id), prod);
    showNotif(editingId ? "Actualizado" : "Creado");
    closeModal();
  };

  window.deleteProduct = async (id) => {
    if(confirm("¿Eliminar?")) await remove(ref(db, 'productos/' + id));
  };

  window.editProduct = (id) => {
    const p = products.find(x => x.id === id);
    editingId = id;
    document.getElementById('fName').value = p.name;
    document.getElementById('fPrice').value = p.price;
    document.getElementById('fBadge').value = p.badge || "";
    document.getElementById('fOldPrice').value = p.oldPrice || "";
    document.getElementById('fImgUrl').value = p.img || "";
    document.getElementById('modalOverlay').style.display = 'grid';
  };

  function renderTable() {
    document.getElementById('tableBody').innerHTML = products.map(p => `
      <tr>
        <td><div class="prod-info"><img src="${p.img || ''}" class="prod-img"><b>${p.name}</b></div></td>
        <td>${p.badge ? `<span class="badge">${p.badge}</span>` : '—'}</td>
        <td>$${p.price.toLocaleString('es-CL')}</td>
        <td>
          <div class="actions">
            <button class="btn-icon" onclick="editProduct(${p.id})">✎</button>
            <button class="btn-icon" onclick="deleteProduct(${p.id})">✕</button>
          </div>
        </td>
      </tr>`).join('');
  }

  window.openModal = () => { editingId = null; document.getElementById('productForm').reset(); document.getElementById('modalOverlay').style.display = 'grid'; };
  window.closeModal = () => { document.getElementById('modalOverlay').style.display = 'none'; };
  function showNotif(m) { const n = document.getElementById('adminNotif'); n.textContent = m; n.className = 'admin-notif success show'; setTimeout(()=>n.classList.remove('show'), 2000); }
</script>
</body>
</html>
