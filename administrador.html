<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palacio Store — Panel Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  /* Mantenemos tus estilos originales */
  :root { --black: #0a0a0a; --white: #fafafa; --accent: #c8a97e; --green: #2ebd6b; --sidebar-w: 260px; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: #f0ede8; color: var(--black); }
  .admin-container { display: flex; }
  .sidebar { width: var(--sidebar-w); background: var(--black); color: var(--white); padding: 2rem 1.5rem; position: fixed; height: 100vh; }
  .main-content { margin-left: var(--sidebar-w); flex: 1; padding: 3rem; }
  .table-container { background: var(--white); border-radius: 16px; padding: 1.5rem; }
  table { width: 100%; border-collapse: collapse; }
  td, th { padding: 1rem; border-bottom: 1px solid #eee; text-align: left; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; place-items: center; z-index: 1000; }
  .modal { background: var(--white); width: 90%; max-width: 500px; padding: 2.5rem; border-radius: 24px; }
  .btn-primary { background: var(--black); color: white; padding: 0.8rem 1.5rem; border-radius: 50px; cursor: pointer; border: none; }
</style>
</head>
<body>

<div class="admin-container">
  <div class="sidebar">
    <div class="sidebar-logo" style="font-weight:800; font-size:1.5rem; margin-bottom:2rem;">PALACIO STORE</div>
    <ul style="list-style:none;">
      <li style="padding:1rem; background:var(--accent); border-radius:8px;">Productos</li>
      <li style="padding:1rem; cursor:pointer;" onclick="window.location.href='index.html'">Ver Tienda</li>
    </ul>
  </div>

  <div class="main-content">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
      <h1>Gestión de Productos</h1>
      <button class="btn-primary" onclick="openModal()">+ Nuevo Producto</button>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Producto</th>
            <th>Precio</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          </tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Producto</h2>
    <form id="productForm">
      <div style="margin-bottom:1rem;">
        <label>Nombre</label>
        <input type="text" id="fName" style="width:100%; padding:0.8rem;" required>
      </div>
      <div style="margin-bottom:1rem;">
        <label>Precio</label>
        <input type="number" id="fPrice" style="width:100%; padding:0.8rem;" required>
      </div>
      <div style="margin-bottom:1rem;">
        <label>Imagen URL</label>
        <input type="url" id="fImgUrl" style="width:100%; padding:0.8rem;">
      </div>
      <button type="submit" class="btn-primary" style="width:100%;">Guardar Producto</button>
      <button type="button" onclick="closeModal()" style="width:100%; background:none; border:none; margin-top:10px; cursor:pointer;">Cancelar</button>
    </form>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB_Kgid_oL0wscMQlViW1ZweO9v6z_hsz0",
    authDomain: "palacio-store.firebaseapp.com",
    projectId: "palacio-store",
    storageBucket: "palacio-store.firebasestorage.app",
    messagingSenderId: "5927823600",
    appId: "1:5927823600:web:211ffb13596d65c123fa35",
    measurementId: "G-50MRG59294"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const dbRef = ref(db, 'productos');

  let products = [];
  let editingId = null;

  onValue(dbRef, (snapshot) => {
    const data = snapshot.val();
    products = data ? Object.values(data) : [];
    renderTable();
  });

  document.getElementById('productForm').onsubmit = async (e) => {
    e.preventDefault();
    const id = editingId || Date.now();
    const p = {
      id: id,
      name: document.getElementById('fName').value,
      price: parseFloat(document.getElementById('fPrice').value),
      img: document.getElementById('fImgUrl').value || ""
    };
    await set(ref(db, 'productos/' + id), p);
    closeModal();
  };

  window.deleteProduct = async (id) => {
    if(confirm("¿Eliminar?")) await remove(ref(db, 'productos/' + id));
  };

  window.openModal = () => { editingId = null; document.getElementById('productForm').reset(); document.getElementById('modalOverlay').style.display = 'grid'; };
  window.closeModal = () => document.getElementById('modalOverlay').style.display = 'none';

  function renderTable() {
    document.getElementById('tableBody').innerHTML = products.map(p => `
      <tr>
        <td>${p.name}</td>
        <td>$${p.price.toLocaleString('es-CL')}</td>
        <td>
          <button onclick="deleteProduct(${p.id})" style="color:red; cursor:pointer; background:none; border:none;">Eliminar</button>
        </td>
      </tr>
    `).join('');
  }
</script>
</body>
</html>
