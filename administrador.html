<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palacio Store — Panel Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --white: #fafafa;
    --cream: #f5f0eb;
    --accent: #c8a97e;
    --accent2: #e8d5b7;
    --gray: #888;
    --light-gray: #eee;
    --red: #d94f3d;
    --green: #2ebd6b;
    --sidebar-w: 260px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #f0ede8;
    color: var(--black);
    min-height: 100vh;
  }

  /* SIDEBAR */
  .admin-container { display: flex; min-height: 100vh; }
  
  .sidebar {
    width: var(--sidebar-w);
    background: var(--black);
    color: var(--white);
    padding: 2rem 1.5rem;
    position: fixed;
    height: 100vh;
  }

  .sidebar-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.5rem;
    margin-bottom: 3rem;
    letter-spacing: -1px;
  }

  .nav-menu { list-style: none; }
  .nav-item {
    padding: 1rem;
    margin-bottom: 0.5rem;
    cursor: pointer;
    border-radius: 8px;
    transition: 0.3s;
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 500;
  }
  .nav-item:hover { background: #1a1a1a; }
  .nav-item.active { background: var(--accent); color: var(--black); }

  /* MAIN CONTENT */
  .main-content {
    margin-left: var(--sidebar-w);
    flex: 1;
    padding: 3rem;
  }

  .header-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 3rem;
  }

  .btn-primary {
    background: var(--black);
    color: var(--white);
    padding: 0.8rem 1.5rem;
    border: none;
    border-radius: 50px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

  /* TABLE */
  .table-container {
    background: var(--white);
    border-radius: 16px;
    padding: 1.5rem;
    box-shadow: 0 10px 30px rgba(0,0,0,0.03);
  }

  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 1rem; color: var(--gray); font-weight: 500; border-bottom: 1px solid var(--light-gray); }
  td { padding: 1.2rem 1rem; border-bottom: 1px solid var(--light-gray); }

  .prod-info { display: flex; align-items: center; gap: 15px; }
  .prod-img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; background: #eee; }

  .badge {
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
  }
  .badge-new { background: var(--accent2); color: #8a6d3b; }

  .actions { display: flex; gap: 10px; }
  .btn-icon {
    width: 35px; height: 35px; border-radius: 50%; border: 1px solid #ddd;
    display: grid; place-items: center; cursor: pointer; background: none; transition: 0.3s;
  }
  .btn-icon:hover { background: #f5f5f5; }
  .btn-del:hover { background: var(--red); border-color: var(--red); color: white; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: none; place-items: center; z-index: 1000;
  }
  .modal {
    background: var(--white);
    width: 90%; max-width: 500px;
    padding: 2.5rem; border-radius: 24px;
  }
  .form-group { margin-bottom: 1.5rem; }
  label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; }
  input {
    width: 100%; padding: 0.8rem 1rem; border: 1px solid #ddd; border-radius: 12px;
    font-family: inherit;
  }

  .admin-notif {
    position: fixed; bottom: 2rem; right: 2rem;
    padding: 1rem 2rem; border-radius: 12px;
    color: white; transform: translateY(150%); transition: 0.5s;
  }
  .admin-notif.show { transform: translateY(0); }
  .admin-notif.success { background: var(--green); }
</style>
</head>
<body>

<div class="admin-container">
  <div class="sidebar">
    <div class="sidebar-logo">PALACIO STORE</div>
    <ul class="nav-menu">
      <li class="nav-item active">Productos</li>
      <li class="nav-item" onclick="window.location.href='index.html'">Ver Tienda</li>
    </ul>
  </div>

  <div class="main-content">
    <div class="header-actions">
      <h1>Inventario de Productos</h1>
      <button class="btn-primary" onclick="openModal()">+ Nuevo Producto</button>
    </div>

    <div class="table-container">
      <table id="productsTable">
        <thead>
          <tr>
            <th>Producto</th>
            <th>Estado</th>
            <th>Precio</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          </tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle" style="margin-bottom: 1.5rem;">Agregar Producto</h2>
    <form id="productForm">
      <div class="form-group">
        <label>Nombre del Producto</label>
        <input type="text" id="fName" placeholder="Ej: Camiseta Oversize Black" required>
      </div>
      <div class="form-group">
        <label>Etiqueta (Opcional)</label>
        <input type="text" id="fBadge" placeholder="Ej: Nuevo, Sale, 20% OFF">
      </div>
      <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
        <div>
          <label>Precio Actual</label>
          <input type="number" id="fPrice" required>
        </div>
        <div>
          <label>Precio Anterior</label>
          <input type="number" id="fOldPrice">
        </div>
      </div>
      <div class="form-group">
        <label>URL de Imagen</label>
        <input type="url" id="fImgUrl" placeholder="https://ejemplo.com/imagen.jpg">
      </div>
      <div style="display: flex; gap: 10px; margin-top: 2rem;">
        <button type="button" class="btn-primary" style="background: #eee; color: #333;" onclick="closeModal()">Cancelar</button>
        <button type="submit" class="btn-primary" style="flex: 1;">Guardar Producto</button>
      </div>
    </form>
  </div>
</div>

<div id="adminNotif" class="admin-notif"></div>

<script>
  const STORAGE_KEY = 'palacio_store_db';
  let products = [];
  let editingId = null;

  // INICIALIZACIÓN
  function init() {
    const data = localStorage.getItem(STORAGE_KEY);
    if (data) {
      products = JSON.parse(data);
    }
    renderTable();
  }

  // RENDERIZAR TABLA
  function renderTable() {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = products.map(p => `
      <tr>
        <td>
          <div class="prod-info">
            <img src="${p.img || 'https://via.placeholder.com/50'}" class="prod-img">
            <div>
              <div style="font-weight: 700;">${p.name}</div>
              <div style="font-size: 12px; color: #888;">ID: #${p.id}</div>
            </div>
          </div>
        </td>
        <td>
          ${p.badge ? `<span class="badge badge-new">${p.badge}</span>` : '<span style="color:#ccc">—</span>'}
        </td>
        <td style="font-weight: 600;">$${Number(p.price).toLocaleString('es-CL')}</td>
        <td>
          <div class="actions">
            <button class="btn-icon" onclick="editProduct(${p.id})">✎</button>
            <button class="btn-icon btn-del" onclick="deleteProduct(${p.id})">✕</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  // GUARDAR
  document.getElementById('productForm').onsubmit = function(e) {
    e.preventDefault();
    
    const name = document.getElementById('fName').value;
    const badge = document.getElementById('fBadge').value;
    const price = parseFloat(document.getElementById('fPrice').value);
    const oldPrice = parseFloat(document.getElementById('fOldPrice').value) || null;
    const img = document.getElementById('fImgUrl').value;

    if (editingId) {
      const index = products.findIndex(p => p.id === editingId);
      products[index] = { ...products[index], name, badge, price, oldPrice, img };
      showNotif("Producto actualizado");
    } else {
      const newId = products.length > 0 ? Math.max(...products.map(p => p.id)) + 1 : 1;
      products.push({ id: newId, name, badge, price, oldPrice, img });
      showNotif("Producto creado");
    }

    saveToStorage();
    closeModal();
    renderTable();
  };

  function saveToStorage() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
    // IMPORTANTE: Al estar en GitHub, esto solo se guarda en TU navegador.
    // Para que otros lo vean, aquí es donde conectaremos la base de datos MySQL.
  }

  // ACCIONES
  function openModal() {
    editingId = null;
    document.getElementById('productForm').reset();
    document.getElementById('modalTitle').textContent = "Nuevo Producto";
    document.getElementById('modalOverlay').style.display = 'grid';
  }

  function closeModal() {
    document.getElementById('modalOverlay').style.display = 'none';
  }

  function editProduct(id) {
    const p = products.find(x => x.id === id);
    if (!p) return;
    
    editingId = id;
    document.getElementById('fName').value = p.name;
    document.getElementById('fBadge').value = p.badge || '';
    document.getElementById('fPrice').value = p.price;
    document.getElementById('fOldPrice').value = p.oldPrice || '';
    document.getElementById('fImgUrl').value = p.img || '';
    
    document.getElementById('modalTitle').textContent = "Editar Producto";
    document.getElementById('modalOverlay').style.display = 'grid';
  }

  function deleteProduct(id) {
    if (confirm("¿Estás seguro de eliminar este producto?")) {
      products = products.filter(p => p.id !== id);
      saveToStorage();
      renderTable();
      showNotif("Producto eliminado", "error");
    }
  }

  function showNotif(msg, type = "success") {
    const n = document.getElementById('adminNotif');
    n.textContent = msg;
    n.className = `admin-notif show ${type}`;
    setTimeout(() => n.classList.remove('show'), 3000);
  }

  init();
</script>

</body>
</html>
