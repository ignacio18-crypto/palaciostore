<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palacio Store</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #050505;
    --gold: #d4af37;
    --gold-light: #f1e5ac;
    --white: #ffffff;
    --cream: #f9f7f2;
    --gray: #f0f0f0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--white);
    color: var(--black);
    overflow-x: hidden;
  }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 40px; height: 80px;
    background: rgba(255, 255, 255, 0.98);
    backdrop-filter: blur(15px);
    border-bottom: 1px solid var(--gold);
  }

  .nav-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 26px;
    color: var(--black); text-decoration: none;
    letter-spacing: 2px;
  }
  .nav-logo span { color: var(--gold); }

  .nav-links { display: flex; gap: 30px; }
  .nav-links a { 
    text-decoration: none; color: var(--black); 
    font-weight: 600; font-size: 14px; text-transform: uppercase;
    transition: 0.3s;
  }
  .nav-links a:hover { color: var(--gold); }

  .cart-btn {
    position: relative; background: var(--black); color: var(--white);
    border: 1px solid var(--gold); cursor: pointer; width: 45px; height: 45px;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    transition: 0.3s;
  }
  .cart-btn:hover { background: var(--gold); }

  .cart-count {
    position: absolute; top: -5px; right: -5px;
    background: var(--gold); color: var(--black); font-size: 11px;
    font-weight: 800; width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid var(--white);
  }

  /* HERO */
  .hero {
    margin-top: 80px; padding: 120px 40px;
    background: radial-gradient(circle, #1a1a1a 0%, #000000 100%);
    color: var(--white); text-align: center;
    position: relative; overflow: hidden;
  }

  .hero-title {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: clamp(50px, 10vw, 100px); line-height: 0.9;
    letter-spacing: -3px; margin-bottom: 20px;
  }
  .hero-title em { color: var(--gold); font-style: italic; }

  /* FILTERS */
  .category-nav {
    display: flex; justify-content: center; gap: 20px;
    padding: 40px 0; background: var(--white);
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 12px 30px; border: 1px solid #ddd;
    background: none; font-family: 'Syne', sans-serif;
    font-weight: 700; cursor: pointer; border-radius: 50px;
    transition: 0.3s; text-transform: uppercase;
  }
  .filter-btn.active { background: var(--black); color: var(--gold); border-color: var(--black); }

  /* PRODUCTS GRID */
  .container { padding: 20px 40px 80px; }
  .section-header { text-align: center; margin-bottom: 50px; }
  .section-header h2 { font-family: 'Syne', sans-serif; font-size: 38px; text-transform: uppercase; }

  .products {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 40px;
  }

  .product-card { position: relative; border: 1px solid transparent; transition: 0.4s; padding: 10px; }
  .product-card:hover { border-color: var(--gold); background: #fff; }

  .product-img {
    aspect-ratio: 3/4; background: var(--gray);
    overflow: hidden; position: relative; margin-bottom: 15px;
    display: flex; align-items: center; justify-content: center;
  }

  .product-img img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
  .product-card:hover .product-img img { transform: scale(1.05); }

  /* Emoji placeholder for products without image */
  .product-emoji-placeholder {
    font-size: 72px;
    opacity: 0.4;
    user-select: none;
  }

  .quick-add {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: var(--gold); color: var(--black);
    border: none; padding: 15px; cursor: pointer;
    font-family: 'Syne', sans-serif; font-weight: 800;
    text-transform: uppercase; transform: translateY(100%);
    transition: 0.3s;
  }
  .product-card:hover .quick-add { transform: translateY(0); }

  .product-badge {
    position: absolute; top: 12px; left: 12px;
    font-size: 10px; font-weight: 700;
    padding: 4px 10px; border-radius: 999px;
    text-transform: uppercase; letter-spacing: 0.5px;
    z-index: 1;
  }
  .badge-new { background: #e8f5f0; color: #1a8a5a; }
  .badge-sale { background: #fff0ee; color: #d94f3d; }
  .badge-hot { background: #fdf2e6; color: #b07820; }

  .product-name { font-family: 'Syne', sans-serif; font-weight: 700; margin-bottom: 5px; font-size: 18px; }
  .product-price { font-weight: 400; font-size: 16px; color: var(--gold); border-top: 1px solid #eee; padding-top: 5px; display: flex; gap: 10px; align-items: center; }
  .product-old-price { font-size: 13px; color: #aaa; text-decoration: line-through; }
  .product-cat { font-size: 10px; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }

  /* Empty state */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center; padding: 80px 20px;
    color: #aaa;
  }
  .empty-state p { font-size: 18px; margin-top: 16px; }

  /* CART DRAWER */
  .cart-drawer { 
    position: fixed; top: 0; right: 0; bottom: 0; width: 100%; max-width: 450px; 
    background: var(--white); transform: translateX(100%); transition: 0.5s cubic-bezier(0.77,0,0.175,1); 
    z-index: 301; display: flex; flex-direction: column;
    box-shadow: -10px 0 30px rgba(0,0,0,0.1);
  }
  .cart-drawer.open { transform: translateX(0); }
  .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); opacity: 0; pointer-events: none; transition: 0.3s; z-index: 300; }
  .cart-overlay.open { opacity: 1; pointer-events: all; }
  
  .cart-header { padding: 30px; background: var(--black); color: var(--gold); display: flex; justify-content: space-between; align-items: center; }
  
  /* LIVE BADGE */
  .live-badge {
    position: fixed; bottom: 110px; right: 30px;
    background: var(--black); color: var(--gold);
    font-size: 11px; font-weight: 700;
    padding: 6px 14px; border-radius: 999px;
    border: 1px solid var(--gold);
    z-index: 200; letter-spacing: 1px;
    text-transform: uppercase;
    display: flex; align-items: center; gap: 6px;
    opacity: 0; transform: translateY(10px);
    transition: all 0.4s;
    pointer-events: none;
  }
  .live-badge.show { opacity: 1; transform: translateY(0); }
  .live-dot { width: 7px; height: 7px; background: #2ebd6b; border-radius: 50%; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* FOOTER */
  footer { background: var(--black); color: var(--white); padding: 80px 40px; text-align: center; border-top: 5px solid var(--gold); }

  .wsp-fixed { position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px; background: #25D366; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 200; box-shadow: 0 10px 20px rgba(0,0,0,0.3); border: 2px solid white; }
  .ig-fixed { position: fixed; bottom: 30px; right: 110px; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 200; box-shadow: 0 10px 20px rgba(0,0,0,0.3); border: 2px solid white; background: radial-gradient(circle at 30% 110%, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); transition: transform 0.2s; }
  .ig-fixed:hover { transform: scale(1.08); }
</style>
</head>

<script>
// ─── CLAVE DE STORAGE (debe ser igual al admin) ───────────────────────────────
const STORAGE_KEY = 'palacio_products';

// Productos por defecto (igual que el admin) — se usan solo si no hay nada en localStorage
const DEFAULT_PRODUCTS = [
  { id:1, name:'Oversized Tee Acid', cat:'remeras', price:24990, oldPrice:34990, emoji:'👕', badge:'sale', img:null },
  { id:2, name:'Cargo Jogger Negro', cat:'pantalones', price:49990, emoji:'👖', badge:'new', img:null },
  { id:3, name:'Bomber Coach Jacket', cat:'outerwear', price:79990, emoji:'🧥', badge:'hot', img:null },
  { id:4, name:'Bucket Hat Logo', cat:'accesorios', price:18990, emoji:'🧢', badge:'new', img:null },
  { id:5, name:'Vintage Washed Tee', cat:'remeras', price:22990, emoji:'👕', badge:null, img:null },
  { id:6, name:'Wide Leg Cargo', cat:'pantalones', price:54990, oldPrice:69990, emoji:'👖', badge:'sale', img:null },
  { id:7, name:'Puffer Jacket Color', cat:'outerwear', price:89990, emoji:'🧥', badge:'new', img:null },
  { id:8, name:'Crossbody Bag', cat:'accesorios', price:32990, emoji:'👜', badge:null, img:null },
  { id:9, name:'Graphic Hoodie', cat:'remeras', price:44990, emoji:'👕', badge:'hot', img:null },
  { id:10, name:'Parachute Pants', cat:'pantalones', price:59990, emoji:'👖', badge:'new', img:null },
  { id:11, name:'Corduroy Overshirt', cat:'outerwear', price:64990, oldPrice:79990, emoji:'🧥', badge:'sale', img:null },
  { id:12, name:'Chain Necklace', cat:'accesorios', price:14990, emoji:'📿', badge:null, img:null },
];

// ─── ESTADO ───────────────────────────────────────────────────────────────────
let PRODUCTS_DB = [];
let cart = [];
let currentCategory = 'todos';

// ─── CARGAR PRODUCTOS DESDE LOCALSTORAGE ─────────────────────────────────────
function loadProducts() {
  try {
    const stored = localStorage.getItem(STORAGE_KEY);
    PRODUCTS_DB = stored ? JSON.parse(stored) : [...DEFAULT_PRODUCTS];
  } catch {
    PRODUCTS_DB = [...DEFAULT_PRODUCTS];
  }
}

// ─── RENDER GRILLA ────────────────────────────────────────────────────────────
function renderProducts() {
  const grid = document.getElementById('productGrid');
  const filtered = currentCategory === 'todos'
    ? PRODUCTS_DB
    : PRODUCTS_DB.filter(p => p.cat === currentCategory);

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div style="font-size:48px">🛍️</div>
        <p>No hay productos en esta categoría</p>
      </div>`;
    return;
  }

  const badgeLabels = { new:'Nuevo', sale:'Oferta', hot:'Hot 🔥' };
  const badgeClass  = { new:'badge-new', sale:'badge-sale', hot:'badge-hot' };

  grid.innerHTML = filtered.map(p => `
    <div class="product-card">
      <div class="product-img">
        ${p.badge ? `<span class="product-badge ${badgeClass[p.badge]}">${badgeLabels[p.badge]}</span>` : ''}
        ${p.img
          ? `<img src="${p.img}" alt="${p.name}" loading="lazy">`
          : `<div class="product-emoji-placeholder">${p.emoji}</div>`
        }
        <button class="quick-add" onclick="addToCart(${p.id})">Añadir al Trono</button>
      </div>
      <p class="product-cat">${p.cat}</p>
      <p class="product-name">${p.name}</p>
      <div class="product-price">
        $${p.price.toLocaleString('es-CL')}
        ${p.oldPrice ? `<span class="product-old-price">$${p.oldPrice.toLocaleString('es-CL')}</span>` : ''}
      </div>
    </div>
  `).join('');
}

// ─── FILTRAR ──────────────────────────────────────────────────────────────────
function filterCat(cat, btn) {
  currentCategory = cat;
  if (btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  renderProducts();
}

// ─── CARRITO ──────────────────────────────────────────────────────────────────
function addToCart(id) {
  const p = PRODUCTS_DB.find(x => x.id === id);
  if (!p) return;
  const existing = cart.find(x => x.id === id);
  if (existing) existing.qty++; else cart.push({...p, qty: 1});
  updateCartUI();
  if (!document.getElementById('cartDrawer').classList.contains('open')) toggleCart();
}

function updateCartUI() {
  const count = cart.reduce((a, b) => a + b.qty, 0);
  document.getElementById('cartCount').textContent = count;
  const itemsDiv = document.getElementById('cartItems');

  if (cart.length === 0) {
    itemsDiv.innerHTML = '<p style="text-align:center; color:gray; margin-top:40px">El cofre está vacío</p>';
  } else {
    itemsDiv.innerHTML = cart.map(i => `
      <div style="display:flex; gap:15px; margin-bottom:20px; align-items:center;">
        <div style="width:70px; height:90px; background:#f0ede8; border-radius:4px; overflow:hidden; flex-shrink:0; display:flex; align-items:center; justify-content:center;">
          ${i.img
            ? `<img src="${i.img}" style="width:100%; height:100%; object-fit:cover;">`
            : `<span style="font-size:32px">${i.emoji}</span>`
          }
        </div>
        <div style="flex:1">
          <p style="font-weight:700; font-size:14px; margin-bottom:4px">${i.name}</p>
          <p style="color:var(--gold); font-size:14px">${i.qty} × $${i.price.toLocaleString('es-CL')}</p>
        </div>
        <button onclick="removeFromCart(${i.id})" style="border:none; background:none; cursor:pointer; font-size:22px; color:#aaa; padding:4px">×</button>
      </div>
    `).join('');
  }

  const total = cart.reduce((a, b) => a + (b.price * b.qty), 0);
  document.getElementById('cartTotal').textContent = `$${total.toLocaleString('es-CL')}`;
}

function removeFromCart(id) {
  cart = cart.filter(x => x.id !== id);
  updateCartUI();
}

function toggleCart() {
  document.getElementById('cartDrawer').classList.toggle('open');
  document.getElementById('cartOverlay').classList.toggle('open');
}

function checkoutWsp() {
  if (cart.length === 0) return alert('Tu cofre está vacío');
  const items = cart.map(i => `• ${i.name} (${i.qty})`).join('\n');
  const total = cart.reduce((a, b) => a + (b.price * b.qty), 0);
  const msg = encodeURIComponent(`👑 ¡Hola Palacio Store! Quiero mi orden:\n\n${items}\n\nTotal: $${total.toLocaleString('es-CL')}`);
  window.open(`https://wa.me/56912345678?text=${msg}`);
}

// ─── SINCRONIZACIÓN EN TIEMPO REAL ───────────────────────────────────────────
// Escucha cambios en localStorage desde OTRA pestaña (donde está el admin)
window.addEventListener('storage', function(e) {
  if (e.key === STORAGE_KEY) {
    loadProducts();
    renderProducts();
    showLiveBadge();
  }
});

// Cuando la pestaña vuelve a estar visible, recarga los productos
document.addEventListener('visibilitychange', function() {
  if (!document.hidden) {
    loadProducts();
    renderProducts();
  }
});

function showLiveBadge() {
  const badge = document.getElementById('liveBadge');
  badge.classList.add('show');
  setTimeout(() => badge.classList.remove('show'), 3000);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadProducts();
renderProducts();
updateCartUI();
</script>
</body>
</html>
